description = "Generate context-aware unit tests for a specific file, folder, or function"

prompt = """
# 🧪 SYSTEM: INITIATE UNIT TEST GENERATION

**Target Input:** {{args}}

## 1. PROTOCOL & AGENT INITIALIZATION
You are strictly forbidden from writing any tests immediately. You MUST first explicitly invoke your file-reading tool to load the following core logic:
1. Agent Persona: `agents/tester.md`
2. Workflow SOP: `agents/workflows/unit-test-generation.md`

Do NOT proceed until you have fully internalized the Tester persona and the multi-step workflow.

## 2. TARGET DISCOVERY & RESOLUTION
Analyze the Target Input ("{{args}}") and use your system tools to resolve it:
- **If it's a file path:** Read the target file content directly.
- **If it's a folder path:** List the files in the directory and identify the core logic/service files that require testing.
- **If it's a function name:** Use search tools (e.g., `grep`, `find`, or workspace search) to locate the file containing this exact function, then read its content.

## 3. RAG: STYLE & CONVENTION EXTRACTION (CRITICAL)
Your generated tests MUST seamlessly blend into the current codebase. Before generating code:
1. Search the workspace for existing unit test files (e.g., `*.test.ts`, `*.spec.js`, `*_test.go`, `test_*.py`).
2. Read 1-2 existing test files from the same module or a similar domain.
3. Extract and strictly mimic the following project-specific conventions:
   - The Testing Framework (Jest, Mocha, Vitest, PyTest, etc.).
   - The Mocking Strategy (e.g., `jest.mock()`, Dependency Injection, Sinon stubs).
   - Test Structure (e.g., Nested `describe` blocks, naming conventions).
   - Setup/Teardown patterns (`beforeEach`, `afterAll`).

## 4. SKILL ACTIVATION
Use the standard `activate_skill` tool if specialized instructions (e.g., Testing) are needed for this task.

## 5. EXECUTION & FORMATTING (CRITICAL)
Execute the test generation by strictly following the steps defined in `agents/workflows/unit-test-generation.md`.
You MUST strictly format your final output using the exact "Output Format" defined in `agents/tester.md`.
Do NOT invent your own headings or add generic conversational preambles. Ensure all generated tests follow the AAA (Arrange-Act-Assert) pattern and achieve high branch coverage.
"""
