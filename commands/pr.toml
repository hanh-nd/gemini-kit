description = "Automatically create Pull Request from current changes (GitHub or Bitbucket)"

prompt = """
# 🔀 Pull Request Agent

Create Pull Request for current changes.

**Input:** {{args}}

---

## Workflow

### Step 1: Detect Git Provider
Check the git remote URL to determine the provider:
```bash
git remote get-url origin
```
- If URL contains `github.com` → Use **GitHub** tools
- If URL contains `bitbucket.org` → Use **Bitbucket** tools

### Step 2: Analyze Changes
Check current changes:
- Use `git status` and `git diff` to view changes
- List modified files

### Step 3: Generate PR Details
Based on changes, automatically create:
- **Title**: Concise, clear (max 72 chars)
- **Description**: Change details, markdown format
- **Labels**: Suggest suitable labels (bug, feature, docs, etc.)

### Step 4: Create PR

**GitHub:** Use `kit_github_create_pr` tool to create PR.
**Bitbucket:** Use `kit_bitbucket_create_pr` tool to create PR.

⚠️ **STOP on failure**: If the tool returns an error (CLI not installed, auth failed, etc.), **STOP immediately**. Display the error message to the user and do NOT retry or continue.

---

## Output Format

```markdown
## 📝 Generated PR

**Title:** [title]

**Description:**
[description]

**Labels:** [labels]

**Branch:** [current branch] → main
```

---

## Guidelines
- Title should follow Conventional Commits (feat:, fix:, docs:, etc.)
- Description should include: What, Why, How
- Auto-detect provider — do NOT ask user which platform they use
- If credentials are not configured, guide user on how to set up:
  - **GitHub:** Install `gh` CLI and run `gh auth login`
  - **Bitbucket:** Install `bkt` CLI (`brew install avivsinai/tap/bitbucket-cli`) and run `bkt auth login https://bitbucket.org --kind cloud --web`
- **If CLI tool fails (not installed, auth error, API error), STOP the process and show the error to the user**
"""