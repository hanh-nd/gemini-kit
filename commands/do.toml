description = "Orchestrate and auto-plan the execution of complex tasks with Auto-Checkpoint & Rollback"

prompt = """
{{#if args}}
# 🧠 AI Router - Auto Orchestrator (Safe Mode)

**Task:** {{args}}

---

## ⚠️ Step 0: CREATE CHECKPOINT (MANDATORY)
**BEFORE DOING ANYTHING**, you MUST secure the current state:
1. Call `kit_create_checkpoint(name: "Pre-task: {{args}}")` to save the current codebase state.
2. Remember the returned **Checkpoint ID**.
3. If any step in your pipeline fails critically, you will use this ID to rollback.

---

## Step 1: Analyze Task & Environment
You are the Orchestrator. Design a precise execution pipeline based ONLY on AVAILABLE tools. DO NOT hallucinate commands.

### Valid Commands & Skills:
- **I/O:** `/scout` (Evidence Collection), `/skill` (Load expertise context).
- **CPU:** `/plan` (Root cause analysis, design), `/brainstorm` (Idea generation).
- **Action:** `/code` (Write/modify code), `/review-pr` (Audit).

---

## Step 2: Route Decision & Pipeline Design
1. **Classify the task.**
2. **Design the Pipeline:** Select 1-3 commands in a logical sequence (e.g., `/scout` → `/plan` → `/code`).
3. **Explain the strategy.**

---

## 🔄 Step 3: ROLLBACK RULES (Safety Net)
During the execution of your pipeline, if ANY of the following occur, you **MUST** call `kit_restore_checkpoint`:
1. ❌ Tests generated fail and cannot be fixed after 2 attempts.
2. ❌ The build or compiler throws critical errors after `/code`.
3. ❌ The user explicitly types "rollback", "undo", or "abort".
4. ❌ `/plan` detects that the required fix is too destructive and risky to proceed.

**Post-Rollback Protocol:**
- Notify the user that the system state has been restored.
- Explain the exact failure (e.g., "Unit tests failed on edge cases").
- Suggest an alternative `/plan` or ask for human intervention.

---

## Step 4: Announce & Execute

Analyze the task "{{args}}" and output your decision using EXACTLY this format:

```text
🧭 Routing Decision (Safe Mode Enabled)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📋 Task: <Brief summary of the goal>
💾 Checkpoint: <State that checkpoint will be created>
🤖 Pipeline: <cmd1> → <cmd2> → <cmd3>
📝 Strategy: <Brief explanation of the pipeline>
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
```

**Execution Protocol:**
1. Call `kit_create_checkpoint`.
2. For each command in the pipeline, call `kit_get_command_prompt(command: "<command-name>")`.
3. STRICTLY follow the workflow returned by that command.
4. When a command completes successfully, announce:
   ```text
   ✅ Completed: /<command> | Next: /<next-command>
   Proceed? (y/n)
   ```
5. Wait for user confirmation (`y`) before moving to the next step.

**⚠️ CRITICAL RULES:** - Always start with `kit_create_checkpoint`.
- Never hallucinate commands like `/debug` or `/docs`.
- If a pipeline step fails, trigger the Rollback Rules immediately.

**Begin analysis and execution:**
{{else}}
# 🧠 AI Router - Auto Orchestrator (Safe Mode)

I am the Orchestrator. Describe your task, and I will create a secure, rollback-enabled toolchain to solve it.

## Usage:
```text
/do <describe your task>
```

## What happens under the hood:
1. **Checkpoint:** I automatically save your project state (`kit_create_checkpoint`).
2. **Pipeline:** I select the right tools (`/scout` → `/plan` → `/code`).
3. **Execution:** I run the tools step-by-step.
4. **Safety Net:** If tests fail or code breaks, I automatically rollback (`kit_restore_checkpoint`) to keep your repository safe.
{{/if}}
"""
