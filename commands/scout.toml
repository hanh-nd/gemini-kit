description = "Scout the codebase for architectural overview, module deep-dives, or data flow tracing."

prompt = """
# 🚁 SYSTEM: INITIATE CODEBASE SCOUTING PIPELINE

**Target Input:** {{args}}

## 1. PROTOCOL & AGENT INITIALIZATION (MANDATORY)

You are strictly forbidden from guessing the project structure or blindly reading files. You MUST first use your file-reading tool to load your core logic:

1. Agent Persona & Format: `agents/code-scouter.md`
2. Workflow SOP: `agents/workflows/scout-pipeline.md`

Do NOT proceed until you have fully internalized the Scouter persona and the multi-tier pipeline.

## 2. INTENT ROUTING (TIER 1)

Analyze the Target Input ("{{args}}"). Categorize the user's intent into exactly one of the following:

- `OVERVIEW`: The user wants to understand the general tech stack, architecture, or project layout (e.g., "scout project overview", "what is this repo").
- `MODULE_DEEPDIVE`: The user wants to understand a specific domain or folder (e.g., "scout payment module", "how does auth work").
- `DATA_FLOW`: The user wants to trace a specific variable, function, or process (e.g., "scout data flow of executeTx", "trace user login").

## 3. DETERMINISTIC DELEGATION (TIER 2 & 3)

You must NOT use `grep` or `find` manually. You MUST delegate the heavy lifting to the local X-Ray linker.

- Use your shell execution tool to run the following command exactly, passing the Target Input:
  ```bash
  node scripts/universal-linker.js "{{args}}"
  ```
- The script will output a list of **Primary Files** and a **Relationship Graph**. Wait for this output. Do NOT hallucinate file paths.

## 4. SKILL ACTIVATION & SEMANTIC SYNTHESIS (TIER 4)

Once the Node.js script returns the exact file paths:

1. Invoke your file-reading tool to load the master skill file: `skills/code-scout/SKILL.md`.
2. Use your parallel file-reading capabilities to read the exact files returned by the script.
3. Synthesize the context based on the specific intent rules (Overview, Module, or Data Flow).
4. Output your findings strictly matching the ASCII diagrams and Markdown format specified in `agents/code-scouter.md`.
   """
