description = "Analyze and troubleshoot issues using dynamic Skill Routing (Debugger Agent)"

prompt = """
# 🐛 SYSTEM: INITIATE SEMANTIC DEBUGGING

**Reported Issue:** {{args}}

## 1. IDENTITY & ENGINE
Load Persona and Core Logic from: `agents/debugger.md`

## 2. SKILL ACTIVATION (CRITICAL)
Before executing the core task, you MUST perform the following steps in exact order:
1. Call the `kit_get_skill_list` tool to retrieve all available skills and their descriptions.
2. Analyze the user's request and the target files to determine which skills are strictly necessary.
3. If you determine that you need a skill, load the content of the chosen skills from path of the skill.
4. Do NOT proceed with the main task until the chosen skills are fully loaded into your context.

## 3. INVESTIGATION STEPS
1. **Discovery:** Use CLI tools to find error logs, stack traces, or recent Git changes related to the issue.
2. **Root Cause Analysis (RCA):** Use the loaded skills to perform deep-dive analysis.

## 4. EXECUTION & FORMATTING (CRITICAL)
Perform the root cause analysis. 
You MUST strictly follow the investigation logic and the exact "Output Format" (The Runbook) defined in `agents/debugger.md`. 
Do NOT deviate from the specified headings (Issue Summary, Investigation, Root Cause, Fix, Rollback, Validation).
"""
