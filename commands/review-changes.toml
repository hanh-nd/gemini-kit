description = "Review local code changes (working tree or branch) enriched with auto-detected Jira context."

prompt = """

# 🕵️ SYSTEM: INITIATE LOCAL CODE REVIEW PIPELINE

**Target Base (Branch/Commit):** {{args}} (If empty, defaults to working tree/HEAD)

## 1. DATA ACQUISITION & FILTERING (TIER 2)

You MUST NOT execute a raw `git diff`. You MUST use your shell tool to run the following exact script to gather filtered data and extract the context safely:

```bash
# A. Define Target Base
BASE_TARGET="{{args}}"
if [ -z "$BASE_TARGET" ]; then
  BASE_TARGET="HEAD"
fi

# B. Extract Jira Ticket ID from the current branch name
TICKET_ID=$(git branch --show-current | grep -oE '[A-Z]+-[0-9]+' || echo "NONE")

# C. Fetch Jira Data (Conditional)
if [ "$TICKET_ID" != "NONE" ]; then
  # Assuming kit_jira_get_ticket is an available CLI command or function
  JIRA_CONTEXT=$(kit_jira_get_ticket "$TICKET_ID")
else
  JIRA_CONTEXT="NO_TICKET_CONTEXT"
fi

# D. Generate Filtered Git Diff
# Exclude lock files, build artifacts, and minified assets to protect context limits
DIFF_DATA=$(git diff $BASE_TARGET -- . ':(exclude)*lock.json' ':(exclude)*.lock' ':(exclude)dist/*' ':(exclude)build/*' ':(exclude)*.min.js' ':(exclude)public/*' ':(exclude)*.svg' ':(exclude)*.png')

echo "{\"ticket_id\": \"$TICKET_ID\", \"jira_context\": \"$JIRA_CONTEXT\", \"diff_length\": ${#DIFF_DATA}}"
# Save the actual diff to a temp file to avoid terminal overflow if needed, or pass directly if supported.
echo "$DIFF_DATA" > .gemini-kit/tmp/current_diff.txt
```

## 2. IDENTITY & PIPELINE INTEGRATION

1. Load Persona: `agents/code-reviewer.md`
2. Load Workflow: `agents/workflows/code-review-pipeline.md`

## 3. EXECUTION INSTRUCTIONS

1. **Context Ingestion:** Read the `.gemini-kit/tmp/current_diff.txt` file.
2. **Context Alignment:** If `jira_context` is NOT "NO_TICKET_CONTEXT", evaluate the diff against the Acceptance Criteria provided in the Jira ticket. If the diff introduces logic that contradicts the ticket, flag it as a "Requirement Violation".
3. **Syntax & Convention:** Regardless of Jira context, apply your standard `coding-common` skills to detect code smells, security flaws, or convention violations in the diff.
4. **Actionability Rule:** You are forbidden from leaving generic comments like "Refactor this". You MUST provide the corrected code snippet using the standard format.

## 4. OUTPUT & FORMATTING (CRITICAL)

Your final output MUST exactly match the format specified in `agents/code-reviewer.md`.
Every piece of feedback MUST be actionable, contain a code snippet demonstrating the fix, and be classified strictly as `[BLOCKER]` or `[NITPICK]`.
"""
