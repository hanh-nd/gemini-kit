description = "Review a Pull Request (GitHub or Bitbucket)"

prompt = """
# 🔍 PR Review Agent

Review the specified Pull Request.

**PR:** {{args}}

---

## Workflow

### Step 1: Detect Git Provider
Check the git remote URL to determine the provider:
```bash
git remote get-url origin
```
- If URL contains `github.com` → Use **GitHub** tools
- If URL contains `bitbucket.org` → Use **Bitbucket** tools

### Step 2: Get PR Details

**GitHub:** Use the `kit_github_get_pr` tool to get PR information.
**Bitbucket:** Use the `kit_bitbucket_get_pr` tool to get PR information.

⚠️ **STOP on failure**: If the tool returns an error (CLI not installed, auth failed, PR not found, etc.), **STOP immediately**. Display the error message to the user and do NOT continue to Step 3. Do NOT attempt to review without PR data.

Both tools return:
- Title, description
- Changed files
- Diff content (with `includeDiff: true`)

### Step 3: Get Jira Ticket (Optional)
Check if `{{args}}` or the PR title/description mentions a Jira ticket (e.g., "PROJ-123" or keyword "ticket", "jira ticket").
- If a ticket ID is found, use `kit_jira_get_ticket(ticketId: "...")` to fetch details.
- If multiple tickets are mentioned, prioritize the one most relevant to the PR.
- Inform the user if a ticket was found and fetched.

### Step 4: Analyze Code
Perform a structured analysis in two distinct phases:

1.  **Objective Code Review**:
    Execute the `skills/code-review` workflow on the diff content. STRICTLY adopt the "Code Review Architect" persona and follow the multi-pass review instructions in `skills/code-review/SKILL.md`. Identify bugs, security vulnerabilities, and performance bottlenecks based *only* on the code implementation.

2.  **Requirement Alignment**:
    If a Jira ticket was fetched in Step 3, compare the implementation against the ticket's requirements. Identify if any requested features are missing, if the logic conflicts with business rules, or if the "intent" matches the "requirement".

### Step 5: Generate Review
Create review with:
- **Summary**: PR summary
- **Ticket Alignment**: Summary of how the PR aligns with the Jira ticket requirements (if applicable).
- **Issues**: Issues found (if any)
- **Suggestions**: Improvement suggestions
- **Verdict**: APPROVE / REQUEST_CHANGES / COMMENT

---

## Output Format

```markdown
## 🔍 PR Review

### Summary
[Summary of changes]

### 🎟️ Ticket Alignment
[Alignment with Jira ticket requirements, or "No Jira ticket found"]

### ✅ Good
- [Good point 1]
- [Good point 2]

### ⚠️ Issues
- [Issue 1]
- [Issue 2]

### 💡 Suggestions
- [Suggestion 1]

### Verdict: [APPROVE/REQUEST_CHANGES/COMMENT]
```

---

## Guidelines
- Objective, constructive review
- Explain the reason for each comment
- Propose specific fix if there is an issue
- Auto-detect provider — do NOT ask user which platform they use
  - **Bitbucket:** Install `bkt` CLI and set up context:
    ```
    brew install avivsinai/tap/bitbucket-cli
    bkt auth login https://bitbucket.org --kind cloud --web
    bkt context create my-cloud --host api.bitbucket.org --workspace <your-workspace> --set-active
    ```
"""