description = "Automated PR Review for GitHub or Bitbucket with Jira integration"

skills = ["code-review", "security", "requirements-alignment"]

prompt = """
# 🔍 SYSTEM: INITIATE PR REVIEW

**PR Target:** {{args}}

## 1. IDENTITY & STANDARDS
Load Persona and Analysis Logic from: `agents/reviewer.md`

## 2. CONTEXT ACQUISITION (Mandatory Steps)
1. **Analyze Input:** Parse `{{args}}` which can be a URL or a Numeric ID.
    - **GitHub Pattern:** `https://github.com/{owner}/{repo}/pull/{number}`
    - **Bitbucket Pattern:** `https://bitbucket.org/{workspace}/{repoSlug}/pull-requests/{id}`
2. **Detect Context:** If `{{args}}` is only an ID, run `git remote get-url origin` to identify the provider and repository details.
3. **Fetch PR Data:**
    - **If GitHub:** Call `kit_github_get_pr(prNumber: number, includeDiff: true, repo: "owner/repo")`.
      - **Note:** Ensure `prNumber` is an integer.
    - **If Bitbucket:** Call `kit_bitbucket_get_pr(prId: number, includeDiff: true, workspace: "...", repoSlug: "...")`.
      - **Note:** Ensure `prId` is an integer. Extract `workspace` and `repoSlug` from the URL or local git remote.
    - **CRITICAL:** If any tool returns an error, STOP and report to user. DO NOT proceed to analysis without Diff content.
4. **Fetch Jira Context (Optional):**
    - Scan PR title, description, and `{{args}}` for Jira Ticket IDs (e.g., PROJ-123).
    - If a Ticket ID is found, call `kit_jira_get_ticket(ticketId: "EXTRACTED-ID")`.

## 3. SKILL ACTIVATION
Load the following skills before starting analyzing the PR:
1. `skills/code-review/SKILL.md`
2. `skills/security/SKILL.md`
3. `skills/requirements-alignment/SKILL.md`

Do NOT output your review until you have successfully executed the tool calls to read these files and internalized their rules.

## 4. EXECUTION & FORMATTING (CRITICAL)
Execute the multi-pass PR review. 
You MUST strictly follow the audit logic and the exact "Output Format" template defined in `agents/reviewer.md`. 
Do NOT invent your own headings, summary styles, or output generic conversational text. Fill the template exactly as instructed.
"""
