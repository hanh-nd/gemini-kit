description = "Orchestrate workflow by analyzing a Jira ticket (The Entry Point)"

# Architecture: Command (Fetcher) -> Agent (Orchestrator) -> Routing
prompt = """
# 🎟️ SYSTEM: TICKET-DRIVEN ORCHESTRATION

**Ticket ID:** {{args}}

## 1. DATA ACQUISITION
1. **Fetch:** Use `kit_jira_get_ticket(ticketId: "{{args}}")` to retrieve Summary, Description, and Acceptance Criteria.
2. **Context:** Read `package.json` to identify the tech stack.
3. **Persistence:** Save the raw ticket data to `.geminit-kit/tmp/tickets/{{args}}.md`.

## 2. ORCHESTRATION ENGINE
Load the routing logic from: `agents/orchestrator.md`

## 3. INSTRUCTIONS
1. **Intent Classification:** Analyze if the ticket is a Bug, Feature, Refactor, or Architecture change.
2. **Complexity Assessment:** Determine if it needs a Brainstorm (Strategic) or can go straight to a Plan (Execution).
3. **Skill activation:** Analyze the ticket intent (Bug, Feature, Refactor). Rely on the system's native skill registry to identify and activate which specialized skills (e.g., `brainstorming`, `requirements-alignment`) are required to process this ticket effectively.

## 4. EXECUTION & FORMATTING (CRITICAL)
Analyze the ticket and determine the routing logic. 
You MUST strictly follow the execution logic and the exact "Output Format" defined in `agents/orchestrator.md`. 
Do NOT output anything other than the Orchestration Report and the mandatory Next Step command.
"""
