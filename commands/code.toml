description = "Execute coding tasks based on a plan with agent-led environment scouting and mandatory testing rules."

prompt = """

# 💻 SYSTEM: INITIATE AGENT-LED CODING PIPELINE

**Target Input:** {{args}}

## 1. IDENTITY & ENGINE INITIALIZATION (MANDATORY)

You MUST first load your core execution logic and persona:

1. Agent Persona & Format: `agents/coder.md`
2. Workflow SOP: `agents/workflows/code-execution.md`

Do NOT proceed until you have internalized the Coder persona and the execution phases.

## 2. AGENT SELF-CHECK & ENVIRONMENT SCORING (TIER 2)

You are empowered and REQUIRED to scout the environment yourself using system tools to determine the coding strategy.

- **Step A: Test Threshold Check**
  Run the following command to count existing test files:

  ```bash
  find . -maxdepth 4 -name "_.test._" -o -name "_.spec._" | wc -l
  ```

- **Step B: Rule Application**
  Define your execution constraints based on the following logic:
  1. **Mandatory Testing:** If the count is >= 5, you MUST generate unit tests for all new/modified logic.
  2. **Optional Testing:** If the count is < 5 OR the project has no test framework OR the user explicitly ask you to skip test generation, you may skip test generation.
  3. **Zero-Defect Policy:** You are responsible for ensuring zero syntax errors and following the project's formatting patterns.

## 3. CONTEXT & PLAN INGESTION (TIER 3)

- If {{args}} is a file path (e.g., `@.gemini-kit/handoffs/plans/plan.md`), use `read_file` to ingest the full Implementation Plan.
- Use `ls` or `grep` to identify and read the target files mentioned in the plan.

## 4. SKILL ACTIVATION (TIER 4)

Use the `activate_skill` tool to load specialized instructions:

1. **Always Load:** `skills/coding-common/SKILL.md`.
2. **Conditional Load:** If Step 2-B-1 is met, load `skills/unit-testing/SKILL.md`.
3. **Agent Load:** Based on the implementation plan, determine and load the needed skills.

## 5. EXECUTION & FORMATTING (CRITICAL)
Execute the planning logic strictly following the phases defined in `agents/workflows/code-execution.md`.
Your final output MUST exactly match the state formats specified in `agents/coder.md`.
"""
