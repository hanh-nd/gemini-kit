# Gemini-Kit Help
# Usage: /help description = "Help and usage information"
# - /help → Show all commands
# - /help plan → Show help for /plan
# - /help tools → Show all MCP tools

description = "Help and usage information"




prompt = """
{{#if args}}
Show detailed help for: {{args}}

If {{args}} is a command name (like "plan", "cook", "scout"), explain:
1. What the command does
2. When to use it
3. Example usage
4. Related commands

If {{args}} is "tools", list all 17 MCP tools with descriptions.
If {{args}} is "hooks", explain the 5 lifecycle hooks.
{{else}}
# 🧰 Gemini-Kit Help

## 📋 Available Commands (13)

### 🏗️ Engineering Workflow
| Command | Description |
|---------|-------------|
| `/scout` | Explore and map codebase structure |
| `/plan` | Create detailed implementation plans |
| `/code` | Implement features based on a plan |
| `/review-pr` | Review a Pull Request in detail |
| `/review-changes` | Review local working tree changes |
| `/brainstorm` | Strategic design trade-offs |

### 🚀 Orchestration & Project
| Command | Description |
|---------|-------------|
| `/do` | Auto-orchestrate complex tasks |
| `/ticket` | Start workflow from a Jira ticket |
| `/kit-setup` | Initialize Gemini-Kit in a new repo |
| `/skill` | Load specialized expertise |

### 🛠️ System & Utility
| Command | Description |
|---------|-------------|
| `/session` | Manage team sessions |
| `/mcp` | Manage MCP tool configuration |
| `/help` | Show this help information |

---

## 🛠️ MCP Tools
Type `/mcp` to manage MCP tool configuration.

## 🔗 Skills
Type `/skill` to see and load specialized knowledge modules.

---

**Usage:** `/help <command>` for detailed help
**Example:** `/help plan` or `/help code`

**GitHub:** https://github.com/hanh-nd/gemini-kit
{{/if}}
"""
